<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Asistencia">
<meta name="theme-color" content="#185FA5">
<title>Asistencia Docente</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#185FA5;--acc-bg:#E6F1FB;--acc-txt:#0C447C;--suc:#27500A;--suc-bg:#EAF3DE;--dan:#791F1F;--dan-bg:#FCEBEB;--war:#633806;--war-bg:#FAEEDA;--neu:#444441;--neu-bg:#F1EFE8;--bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;--txt:#1a1a18;--txt2:#5f5e5a;--brd:rgba(0,0,0,0.12);--brd2:rgba(0,0,0,0.25);--radius:8px;--radius-lg:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2c2c2a;--txt:#f1efe8;--txt2:#888780;--brd:rgba(255,255,255,0.12);--brd2:rgba(255,255,255,0.25)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--txt);font-size:15px;-webkit-tap-highlight-color:transparent}
.hdr{background:var(--bg);border-bottom:0.5px solid var(--brd);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-back{cursor:pointer;font-size:20px;color:var(--txt2);background:none;border:none;padding:4px 8px 4px 0}
.hdr-title{font-size:17px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
.hdr-act{cursor:pointer;background:none;border:none;font-size:14px;color:var(--acc);font-weight:600;padding:6px 0;white-space:nowrap}
.screen{display:none;padding:16px}.screen.active{display:block}
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--acc);color:#fff;border:none;font-size:28px;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
.cc{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-top:6px;background:var(--acc-bg);color:var(--acc-txt)}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:var(--txt2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:0.5px solid var(--brd2);border-radius:var(--radius);padding:9px 12px;font-size:15px;background:var(--bg);color:var(--txt);font-family:inherit}
.field textarea{height:76px;resize:vertical}
.btn{display:inline-block;padding:10px 18px;border-radius:var(--radius);border:0.5px solid var(--brd2);font-size:14px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--txt);font-family:inherit}
.btn-primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-danger{background:var(--dan-bg);color:var(--dan);border-color:var(--dan)}
.btn-warn{background:var(--war-bg);color:var(--war);border-color:var(--war)}
.btn-neu{background:var(--neu-bg);color:var(--neu);border-color:#B4B2A9}
.btn-block{width:100%;text-align:center;display:block;margin-top:8px}
.btn-sm{padding:7px 14px;font-size:13px}
.arow{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.av{width:36px;height:36px;border-radius:50%;background:var(--acc-bg);color:var(--acc-txt);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av-sm{width:30px;height:30px;font-size:11px}
.tabs1{display:flex;border-bottom:0.5px solid var(--brd);margin-bottom:14px;overflow-x:auto}
.tabs2{display:flex;border-bottom:0.5px solid var(--brd);margin-bottom:12px;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:9px 4px;text-align:center;font-size:13px;cursor:pointer;color:var(--txt2);border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;white-space:nowrap}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.tab2{flex:0 0 auto;padding:7px 10px;font-size:12px;cursor:pointer;color:var(--txt2);border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;white-space:nowrap}
.tab2.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.clase-row{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;flex-shrink:0;font-weight:600}
.pill-ok{background:var(--suc-bg);color:var(--suc)}
.pill-pend{background:var(--bg3);color:var(--txt2);border:0.5px solid var(--brd)}
.pill-fer{background:var(--war-bg);color:var(--war)}
.pill-par{background:var(--neu-bg);color:var(--neu)}
.asist-row{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ab{padding:7px 14px;border-radius:var(--radius);border:0.5px solid var(--brd2);font-size:14px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--txt);font-family:inherit;opacity:0.38}
.ab.aP{background:var(--suc-bg);color:var(--suc);border-color:var(--suc);opacity:1}
.ab.aA{background:var(--dan-bg);color:var(--dan);border-color:var(--dan);opacity:1}
.stat-row{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.stat-pct{font-size:17px;font-weight:700;min-width:46px;text-align:right}
.pct-ok{color:var(--suc)}.pct-bad{color:var(--dan)}
.bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.empty{text-align:center;color:var(--txt2);padding:40px 16px;font-size:14px;line-height:1.7}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 16px 40px;max-height:90vh;overflow-y:auto}
.mhandle{width:40px;height:4px;background:var(--brd2);border-radius:2px;margin:0 auto 20px}
.divider{border:none;border-top:0.5px solid var(--brd);margin:12px 0}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#F1EFE8;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.exam-card{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.exam-hdr{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.exam-body{border-top:0.5px solid var(--brd);padding:12px 14px;display:none}
.nota-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nota-inp{width:68px;border:0.5px solid var(--brd2);border-radius:var(--radius);padding:6px 8px;font-size:15px;font-weight:700;text-align:center;background:var(--bg);color:var(--txt);font-family:inherit}
.nota-b{min-width:40px;text-align:center;padding:3px 7px;border-radius:20px;font-size:12px;font-weight:700}
.nb-ok{background:var(--suc-bg);color:var(--suc)}.nb-bad{background:var(--dan-bg);color:var(--dan)}.nb-em{background:var(--bg2);color:var(--txt2)}
.cuatri-sec{background:var(--bg2);border:0.5px solid var(--brd);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.cuatri-ttl{font-size:14px;font-weight:600;margin-bottom:10px}
.date-row{display:flex;gap:8px}
.df{flex:1}.df label{display:block;font-size:11px;color:var(--txt2);margin-bottom:4px}
.df input{width:100%;border:0.5px solid var(--brd2);border-radius:var(--radius);padding:7px 8px;font-size:14px;background:var(--bg);color:var(--txt);font-family:inherit}
.dia-slot{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.dia-slot-del{background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt2);padding:0 4px}
.dias-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.dia-btn{padding:8px 4px;border-radius:var(--radius);border:0.5px solid var(--brd2);font-size:13px;cursor:pointer;text-align:center;background:var(--bg);color:var(--txt);font-family:inherit}
.dia-btn.sel{background:var(--acc-bg);color:var(--acc-txt);border-color:var(--acc)}
.info-box{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--txt2);margin-bottom:12px}
.alumno-card{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.alumno-card-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.alumno-card-body{border-top:0.5px solid var(--brd);padding:14px;display:none}
.resumen-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.resumen-metric{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.resumen-metric-label{font-size:11px;color:var(--txt2);margin-bottom:4px}
.resumen-metric-value{font-size:22px;font-weight:700}
.ex-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--brd)}
.ex-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="hdr" id="hdr">
  <button class="hdr-back" id="backBtn" style="display:none">&#8592;</button>
  <span class="hdr-title" id="hdrTitle">Mis Cursos</span>
  <button class="hdr-act" id="hdrAct" style="display:none"></button>
</div>
<div id="s-cursos" class="screen active"><div id="cursos-list"></div></div>
<div id="s-curso" class="screen">
  <div class="tabs1" id="curso-tabs">
    <button class="tab active" onclick="swTab('alumnos',this)">Alumnos</button>
    <button class="tab" onclick="swTab('clases',this)">Clases</button>
    <button class="tab" onclick="swTab('stats',this)">Porc. Asistencia</button>
    <button class="tab" onclick="swTab('examenes',this)">Examenes</button>
    <button class="tab" onclick="swTab('resumen',this)">Resumen</button>
  </div>
  <div id="tab-alumnos"></div>
  <div id="tab-clases" style="display:none"></div>
  <div id="tab-stats" style="display:none"></div>
  <div id="tab-examenes" style="display:none"></div>
  <div id="tab-resumen" style="display:none"></div>
</div>
<div id="s-clase" class="screen"><div id="clase-content"></div></div>
<button class="fab" id="fab" onclick="fabClick()">+</button>
<div class="modal-bg" id="modal"><div class="modal"><div class="mhandle"></div><div id="modal-body"></div></div></div>
<div class="toast" id="toast"></div>
<script>
var DIAS=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
var MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var MESES_C1=[2,3,4,5,6];
var MESES_C2=[7,8,9,10,11];
var NOTA_APROBADO=7;
var ALL_TABS=['alumnos','clases','stats','examenes','resumen'];

var DB=JSON.parse(localStorage.getItem('docenteApp')||'[]');
var ci=-1,li=-1,curTab='alumnos',curScreen='cursos',curCuat=0,curMes=-1;

function save(){localStorage.setItem('docenteApp',JSON.stringify(DB));}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2400);}
function openModal(html,cb){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').classList.add('open');if(cb)setTimeout(cb,30);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal();});
function ini(n,a){return((a||'')[0]||'').toUpperCase()+((n||'')[0]||'').toUpperCase();}
function isoDate(d){return d.toISOString().split('T')[0];}
function fmtFecha(iso){if(!iso)return'';var p=iso.split('-');return parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0];}
function getISO(cl){
  if(cl.fechaISO&&cl.fechaISO.match(/^\d{4}-\d{2}-\d{2}$/))return cl.fechaISO;
  var yr=new Date().getFullYear(),p=(cl.fecha||'').split('/');
  if(p.length<2)return null;
  return yr+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
}
function getEstado(cl){return cl.estado||'';}
function claseValida(cl){var e=getEstado(cl);return e!=='F'&&e!=='P';}
function notaBadge(n){
  if(n===null)return{cls:'nb-em',txt:'--'};
  return{cls:n>=NOTA_APROBADO?'nb-ok':'nb-bad',txt:n.toFixed(1)};
}

function confirmar(msg,onOk){
  openModal('<div style="text-align:center;padding:8px 0 4px"><div style="font-size:15px;margin-bottom:18px">'+msg+'</div><div style="display:flex;gap:8px"><button class="btn btn-block btn-danger" style="margin-top:0" id="cok">Eliminar</button><button class="btn btn-block" style="margin-top:0" id="cno">Cancelar</button></div></div>');
  document.getElementById('cok').addEventListener('click',function(){closeModal();onOk();});
  document.getElementById('cno').addEventListener('click',closeModal);
}

function go(screen){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('s-'+screen).classList.add('active');
  curScreen=screen;
  updateHeader();
  if(screen==='cursos')renderCursos();
  if(screen==='curso')renderTab(curTab);
  if(screen==='clase')renderClase();
}

function updateHeader(){
  var back=document.getElementById('backBtn');
  var title=document.getElementById('hdrTitle');
  var act=document.getElementById('hdrAct');
  var fab=document.getElementById('fab');
  if(curScreen==='cursos'){
    back.style.display='none';title.textContent='Mis Cursos';act.style.display='none';fab.style.display='flex';
  } else if(curScreen==='curso'){
    var c=DB[ci];
    back.style.display='block';title.textContent=c.nombre;
    act.style.display='block';act.textContent='...';act.onclick=menuCurso;
    fab.style.display=(curTab==='alumnos'||curTab==='examenes')?'flex':'none';
    back.onclick=function(){go('cursos');};
  } else if(curScreen==='clase'){
    var cl=DB[ci].clases[li];
    back.style.display='block';title.textContent='Clase '+cl.fecha;
    act.style.display='block';act.textContent='Guardar';
    act.onclick=function(){save();toast('Guardado');go('curso');};
    fab.style.display='none';
    back.onclick=function(){go('curso');};
  }
}

function swTab(tab,el){
  curTab=tab;
  document.querySelectorAll('#curso-tabs .tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  ALL_TABS.forEach(function(t){document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});
  updateHeader();
  renderTab(tab);
}

function renderCursos(){
  var el=document.getElementById('cursos-list');
  if(!DB.length){el.innerHTML='<div class="empty">No hay cursos aun.<br>Toca + para crear el primero.</div>';return;}
  var html='';
  DB.forEach(function(c,i){
    html+='<div class="cc" data-i="'+i+'">'
      +'<div style="font-weight:600;font-size:16px;margin-bottom:3px">'+c.nombre+'</div>'
      +'<div style="font-size:13px;color:var(--txt2)">'+c.institucion+' &middot; '+c.materia+'</div>'
      +'<span class="badge">'+c.alumnos.length+' alumnos &middot; '+c.clases.length+' clases</span>'
      +'</div>';
  });
  el.innerHTML=html;
  document.querySelectorAll('.cc').forEach(function(el){
    el.addEventListener('click',function(){openCurso(parseInt(this.getAttribute('data-i')));});
  });
}

function openCurso(i){
  ci=i;curTab='alumnos';curCuat=0;curMes=-1;
  document.querySelectorAll('#curso-tabs .tab').forEach(function(t,idx){t.classList.toggle('active',idx===0);});
  ALL_TABS.forEach(function(t,idx){document.getElementById('tab-'+t).style.display=idx===0?'block':'none';});
  go('curso');
}

function renderTab(tab){
  if(tab==='alumnos')renderAlumnos();
  if(tab==='clases')renderClases();
  if(tab==='stats')renderStats();
  if(tab==='examenes')renderExamenes();
  if(tab==='resumen')renderResumen();
}

function renderAlumnos(){
  var c=DB[ci],el=document.getElementById('tab-alumnos');
  if(!c.alumnos.length){el.innerHTML='<div class="empty">Sin alumnos aun.<br>Toca + para agregar.</div>';return;}
  var html='';
  c.alumnos.forEach(function(a,i){
    html+='<div class="arow"><div class="av">'+ini(a.nombre,a.apellido)+'</div>'
      +'<div style="flex:1;font-size:15px">'+a.apellido+', '+a.nombre+'</div>'
      +'<button class="btn btn-sm btn-danger" data-di="'+i+'">Borrar</button></div>';
  });
  el.innerHTML=html;
  document.querySelectorAll('[data-di]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var i=parseInt(this.getAttribute('data-di'));
      var a=DB[ci].alumnos[i];
      confirmar('Eliminar a '+a.apellido+', '+a.nombre+'?',function(){
        DB[ci].alumnos.splice(i,1);save();renderAlumnos();toast('Alumno eliminado');
      });
    });
  });
}

function renderClases(){
  var c=DB[ci],el=document.getElementById('tab-clases');
  if(!c.clases.length){el.innerHTML='<div class="empty">Sin clases configuradas.<br>Usa ... para configurar los dias.</div>';return;}
  var mesesC=curCuat===0?MESES_C1:MESES_C2;
  var mesesConClases=mesesC.filter(function(m){
    return c.clases.some(function(cl){var iso=getISO(cl);return iso&&parseInt(iso.split('-')[1])-1===m;});
  });
  var tabsHtml='<div class="tabs1" style="margin-bottom:10px">'
    +'<button class="tab '+(curCuat===0?'active':'')+'" id="ctab0">1er cuatrimestre</button>'
    +'<button class="tab '+(curCuat===1?'active':'')+'" id="ctab1">2do cuatrimestre</button>'
    +'</div>';
  if(!mesesConClases.length){
    el.innerHTML=tabsHtml+'<div class="empty">Sin clases en este cuatrimestre.</div>';
    document.getElementById('ctab0').addEventListener('click',function(){curCuat=0;curMes=-1;renderClases();});
    document.getElementById('ctab1').addEventListener('click',function(){curCuat=1;curMes=-1;renderClases();});
    return;
  }
  if(curMes<0||mesesConClases.indexOf(curMes)<0)curMes=mesesConClases[0];
  var mesTabsHtml='<div class="tabs2" id="mes-tabs">';
  mesesConClases.forEach(function(m){
    mesTabsHtml+='<button class="tab2 '+(m===curMes?'active':'')+'" data-m="'+m+'">'+MESES[m].substring(0,3)+'</button>';
  });
  mesTabsHtml+='</div>';
  el.innerHTML=tabsHtml+mesTabsHtml+'<div id="clases-mes"></div>';
  document.getElementById('ctab0').addEventListener('click',function(){curCuat=0;curMes=-1;renderClases();});
  document.getElementById('ctab1').addEventListener('click',function(){curCuat=1;curMes=-1;renderClases();});
  document.querySelectorAll('#mes-tabs .tab2').forEach(function(btn){
    btn.addEventListener('click',function(){curMes=parseInt(this.getAttribute('data-m'));renderClases();});
  });
  var clasesMes=c.clases.filter(function(cl){
    var iso=getISO(cl);return iso&&parseInt(iso.split('-')[1])-1===curMes;
  });
  var cMesEl=document.getElementById('clases-mes');
  if(!clasesMes.length){cMesEl.innerHTML='<div class="empty">Sin clases en este mes.</div>';return;}
  var html='';
  clasesMes.forEach(function(cl){
    var realIdx=c.clases.indexOf(cl);
    var estado=getEstado(cl);
    var pillClass='pill-pend',pillTxt='Pendiente';
    if(estado==='F'){pillClass='pill-fer';pillTxt='Feriado';}
    else if(estado==='P'){pillClass='pill-par';pillTxt='Paro';}
    else if(cl.asistencia&&Object.values(cl.asistencia).some(function(v){return v==='P'||v==='A';})){pillClass='pill-ok';pillTxt='Tomada';}
    html+='<div class="clase-row" data-ri="'+realIdx+'">'
      +'<div><div style="font-weight:600">'+cl.fecha+'</div>'
      +'<div style="font-size:12px;color:var(--txt2)">'+(cl.diaNombre||'')+(cl.hora?' &middot; '+cl.hora:'')+'</div></div>'
      +'<span class="pill '+pillClass+'">'+pillTxt+'</span>'
      +'</div>';
  });
  cMesEl.innerHTML=html;
  document.querySelectorAll('.clase-row').forEach(function(row){
    row.addEventListener('click',function(){openClase(parseInt(this.getAttribute('data-ri')));});
  });
}

function renderStats(){
  var c=DB[ci],el=document.getElementById('tab-stats');
  if(!c.alumnos.length||!c.clases.length){el.innerHTML='<div class="empty">Necesitas alumnos y clases para ver estadisticas.</div>';return;}
  var hoy=new Date(),hace90=new Date(hoy);hace90.setDate(hoy.getDate()-90);
  el.innerHTML='<div style="background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px">'
    +'<div style="font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:8px">Periodo a evaluar</div>'
    +'<div class="date-row"><div class="df"><label>Desde</label><input type="date" id="sd" value="'+isoDate(hace90)+'"></div>'
    +'<div class="df"><label>Hasta</label><input type="date" id="sh" value="'+isoDate(hoy)+'"></div></div>'
    +'<button class="btn btn-primary btn-sm" style="margin-top:10px;width:100%" id="calc-btn">Calcular</button>'
    +'</div><div id="stats-out"></div>';
  document.getElementById('calc-btn').addEventListener('click',calcStats);
  calcStats();
}

function calcStats(){
  var c=DB[ci];
  var desde=document.getElementById('sd')?document.getElementById('sd').value:null;
  var hasta=document.getElementById('sh')?document.getElementById('sh').value:null;
  var out=document.getElementById('stats-out');
  if(!desde||!hasta||!out)return;
  var enRango=c.clases.filter(function(cl){var iso=getISO(cl);return iso&&iso>=desde&&iso<=hasta;});
  var validas=enRango.filter(function(cl){return claseValida(cl);});
  var total=validas.length,ferPar=enRango.length-total;
  if(!total){
    out.innerHTML='<div class="empty">No hay clases validas en ese periodo.'+(ferPar>0?'<br><br>'+ferPar+' clase(s) excluida(s) por feriado o paro.':'')+'</div>';
    return;
  }
  var html='';
  c.alumnos.forEach(function(a){
    var pres=validas.filter(function(cl){return (cl.asistencia||{})[a.id]==='P';}).length;
    var pct=Math.round((pres/total)*100),ok=pct>=75;
    html+='<div class="stat-row">'
      +'<div class="av">'+ini(a.nombre,a.apellido)+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:14px;font-weight:600;margin-bottom:4px">'+a.apellido+', '+a.nombre+'</div>'
      +'<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+(ok?'#3B6D11':'#A32D2D')+'"></div></div>'
      +'<div style="font-size:11px;color:var(--txt2);margin-top:3px">'+pres+' de '+total+' clases</div>'
      +'</div>'
      +'<div class="stat-pct '+(ok?'pct-ok':'pct-bad')+'">'+pct+'%</div>'
      +'</div>';
  });
  var resumen=total+' clase(s) validas';
  if(ferPar>0)resumen+=' &middot; '+ferPar+' excluida(s) (feriado/paro)';
  resumen+=' &middot; Verde = 75% o mas';
  out.innerHTML='<div class="info-box">'+resumen+'</div>'+html;
}

function renderResumen(){
  var c=DB[ci];
  var el=document.getElementById('tab-resumen');
  if(!c.alumnos.length){
    el.innerHTML='<div class="empty">Sin alumnos en este curso.</div>';
    return;
  }
  var todasValidas=c.clases.filter(function(cl){return claseValida(cl);});
  var html='';
  c.alumnos.forEach(function(a,ai){
    var pres=todasValidas.filter(function(cl){return (cl.asistencia||{})[a.id]==='P';}).length;
    var totalCl=todasValidas.length;
    var pct=totalCl>0?Math.round((pres/totalCl)*100):null;
    var pctOk=pct!==null&&pct>=75;
    var examenes=c.examenes||[];
    var notasValidas=examenes.filter(function(ex){
      var n=(ex.notas||{})[a.id];
      return n!==undefined&&n!==''&&!isNaN(parseFloat(n));
    });
    var promedio=null;
    if(notasValidas.length>0){
      var suma=notasValidas.reduce(function(s,ex){return s+parseFloat((ex.notas||{})[a.id]);},0);
      promedio=suma/notasValidas.length;
    }
    var promOk=promedio!==null&&promedio>=NOTA_APROBADO;
    var asistColor=pct===null?'var(--txt2)':pctOk?'var(--suc)':'var(--dan)';
    var promColor=promedio===null?'var(--txt2)':promOk?'var(--suc)':'var(--dan)';
    var asistTexto=pct!==null
      ?'<span style="color:'+asistColor+'">Asist. '+pct+'%</span>'
      :'<span style="color:var(--txt2)">Sin clases</span>';
    var promTexto=promedio!==null
      ?'<span style="color:'+promColor+'">Prom. '+promedio.toFixed(1)+'</span>'
      :'<span style="color:var(--txt2)">Sin notas</span>';
    var detalleEx='';
    if(examenes.length){
      detalleEx='<div style="font-size:12px;font-weight:600;color:var(--txt2);margin:8px 0 6px">Detalle por examen</div>';
      examenes.forEach(function(ex){
        var nota=(ex.notas||{})[a.id];
        var n=nota!==undefined&&nota!==''?parseFloat(nota):null;
        var b=notaBadge(n);
        detalleEx+='<div class="ex-row">'
          +'<div><div style="font-size:14px">'+ex.nombre+'</div>'
          +(ex.fecha?'<div style="font-size:11px;color:var(--txt2)">'+ex.fecha+'</div>':'')
          +'</div><span class="nota-b '+b.cls+'">'+b.txt+'</span></div>';
      });
    } else {
      detalleEx='<div style="font-size:13px;color:var(--txt2)">Sin examenes cargados.</div>';
    }
    html+='<div class="alumno-card">'
      +'<div class="alumno-card-hdr" data-ai="'+ai+'">'
      +'<div class="av">'+ini(a.nombre,a.apellido)+'</div>'
      +'<div style="flex:1">'
      +'<div style="font-weight:600;font-size:15px">'+a.apellido+', '+a.nombre+'</div>'
      +'<div style="font-size:12px;margin-top:2px;display:flex;gap:10px">'+asistTexto+promTexto+'</div>'
      +'</div>'
      +'<span style="color:var(--txt2);font-size:18px" id="rarr-'+ai+'">+</span>'
      +'</div>'
      +'<div class="alumno-card-body" id="abody-'+ai+'">'
      +'<div class="resumen-grid">'
      +'<div class="resumen-metric"><div class="resumen-metric-label">Asistencia</div>'
      +'<div class="resumen-metric-value" style="color:'+asistColor+'">'+(pct!==null?pct+'%':'--')+'</div>'
      +(totalCl>0?'<div style="font-size:11px;color:var(--txt2);margin-top:3px">'+pres+' de '+totalCl+' clases</div>':'')
      +'</div>'
      +'<div class="resumen-metric"><div class="resumen-metric-label">Promedio</div>'
      +'<div class="resumen-metric-value" style="color:'+promColor+'">'+(promedio!==null?promedio.toFixed(1):'--')+'</div>'
      +(notasValidas.length>0?'<div style="font-size:11px;color:var(--txt2);margin-top:3px">'+notasValidas.length+' examen(es)</div>':'')
      +'</div>'
      +'</div>'
      +detalleEx
      +'</div>'
      +'</div>';
  });
  el.innerHTML=html;
  document.querySelectorAll('.alumno-card-hdr').forEach(function(hdr){
    hdr.addEventListener('click',function(){
      var ai=parseInt(this.getAttribute('data-ai'));
      var body=document.getElementById('abody-'+ai);
      var arr=document.getElementById('rarr-'+ai);
      var open=body.style.display==='block';
      body.style.display=open?'none':'block';
      arr.textContent=open?'+':'-';
    });
  });

    +'<button class="btn btn-sm btn-danger" id="btn-ta">Todos ausentes</button>'
    +'<button class="btn btn-sm '+(estado==='F'?'btn-warn':'btn-neu')+'" id="btn-fer">'+(estado==='F'?'Quitar feriado':'Feriado')+'</button>'
    +'<button class="btn btn-sm '+(estado==='P'?'btn-warn':'btn-neu')+'" id="btn-par">'+(estado==='P'?'Quitar paro':'Paro Docente')+'</button>'
    +'</div>'+listHtml;
  if(!estado&&!c.alumnos.length){document.getElementById('asist-list').innerHTML='<div class="empty">No hay alumnos en este curso.</div>';}
  document.getElementById('btn-tp').addEventListener('click',function(){setAll('P');});
  document.getElementById('btn-ta').addEventListener('click',function(){setAll('A');});
  document.getElementById('btn-fer').addEventListener('click',function(){setEstado('F');});
  document.getElementById('btn-par').addEventListener('click',function(){setEstado('P');});
  document.querySelectorAll('.ab').forEach(function(btn){

        b.className='ab'+(b.getAttribute('data-val')===val?(val==='P'?' aP':' aA'):'');
      });

function setAll(val){
  var c=DB[ci],cl=c.clases[li];
  cl.estado='';if(!cl.asistencia)cl.asistencia={};
  c.alumnos.forEach(function(a){cl.asistencia[a.id]=val;});
  save();renderClase();
}
function setEstado(est){
  var cl=DB[ci].clases[li];
  cl.estado=cl.estado===est?'':est;
  if(cl.estado)cl.asistencia={};
  save();renderClase();
}

    +'<button class="btn btn-block" style="margin-top:8px" id="imp-cx">Cancelar</button>');

function importar(){
  var txt=document.getElementById('imp-txt').value,c=DB[ci];var count=0;
  txt.split('\n').map(function(l){return l.trim();}).filter(Boolean).forEach(function(l){
    var ap,nm;
    if(l.indexOf(',')>=0){var p=l.split(',');ap=p[0].trim();nm=p[1].trim();}
    else{var p=l.trim().split(/\s+/);ap=p[0];nm=p.slice(1).join(' ');}
    if(ap&&nm){c.alumnos.push({id:'a'+Date.now()+Math.floor(Math.random()*9999),nombre:nm,apellido:ap});count++;}
  });
  c.alumnos.sort(function(x,y){return x.apellido.localeCompare(y.apellido,'es');});
  save();closeModal();renderAlumnos();toast(count+' alumno(s) importado(s)');
}

function generarClases(){
  var c=DB[ci];
  var c1i=document.getElementById('c1i').value,c1f=document.getElementById('c1f').value;
  var c2i=document.getElementById('c2i').value,c2f=document.getElementById('c2f').value;
  if(!c1i||!c1f||!c2i||!c2f){toast('Completa todas las fechas');return;}
  if(!c.diasHoras||!c.diasHoras.length){toast('Agrega al menos un dia');return;}
  c.cuatri={c1i:c1i,c1f:c1f,c2i:c2i,c2f:c2f};
  var rangos=[[c1i,c1f],[c2i,c2f]],yr=new Date().getFullYear(),clases=[];
  for(var m=0;m<12;m++){
    for(var d=1;d<=new Date(yr,m+1,0).getDate();d++){
      var fecha=new Date(yr,m,d),dow=fecha.getDay();
      var match=null;
      c.diasHoras.forEach(function(dh){if(dh.dia===dow)match=dh;});
      if(!match)continue;
      var dd=String(d).padStart(2,'0'),mm=String(m+1).padStart(2,'0'),iso=yr+'-'+mm+'-'+dd;
      var enRango=false;
      rangos.forEach(function(r){if(iso>=r[0]&&iso<=r[1])enRango=true;});
      if(!enRango)continue;
      clases.push({id:'cl'+iso+dow,fecha:d+'/'+(m+1),fechaISO:iso,diaNombre:DIAS[dow],hora:match.hora,asistencia:{},estado:''});
    }
  }
  c.clases=clases;save();closeModal();
  curTab='clases';curCuat=0;curMes=-1;
  document.querySelectorAll('#curso-tabs .tab').forEach(function(t,i){t.classList.toggle('active',i===1);});
  ALL_TABS.forEach(function(t,i){document.getElementById('tab-'+t).style.display=i===1?'block':'none';});
  updateHeader();renderClases();toast(clases.length+' clases generadas');
}

function modalNuevoExamen(){
  var hoy=isoDate(new Date());
  openModal('<div style="font-size:16px;font-weight:600;margin-bottom:16px">Nuevo examen</div>'
    +'<div class="field"><label>Nombre</label><input id="ex-n" placeholder="Ej: Primer parcial"></div>'
    +'<div class="field"><label>Contenidos</label><textarea id="ex-c" placeholder="Unidades 1 y 2..."></textarea></div>'
    +'<div style="display:flex;gap:10px">'
    +'<div class="field" style="flex:1"><label>Fecha</label><input type="date" id="ex-f" value="'+hoy+'"></div>'
    +'<div class="field" style="flex:1"><label>Hora</label><input type="time" id="ex-h"></div>'
    +'</div>'
    +'<button class="btn btn-primary btn-block" id="ex-ok">Crear examen</button>'
    +'<button class="btn btn-block" style="margin-top:8px" id="ex-cx">Cancelar</button>');
  document.getElementById('ex-ok').addEventListener('click',crearExamen);
  document.getElementById('ex-cx').addEventListener('click',closeModal);
  setTimeout(function(){var el=document.getElementById('ex-n');if(el)el.focus();},80);
}
function crearExamen(){
  var n=document.getElementById('ex-n').value.trim();
  if(!n){toast('Escribe un nombre');return;}
  var c=DB[ci];if(!c.examenes)c.examenes=[];
  c.examenes.push({
    id:'ex'+Date.now(),nombre:n,
    contenidos:document.getElementById('ex-c').value.trim(),
    fecha:fmtFecha(document.getElementById('ex-f').value),
    hora:document.getElementById('ex-h').value||'',
    notas:{}
  });
  save();closeModal();renderExamenes();toast('Examen creado');
}

function renderExamenes(){
  var c=DB[ci],el=document.getElementById('tab-examenes');
  if(!(c.examenes||[]).length){el.innerHTML='<div class="empty">Sin examenes aun.<br>Toca + para crear uno.</div>';return;}
  var html='';
  c.examenes.forEach(function(ex,ei){
    var nr='';
    c.alumnos.forEach(function(a){
      var nota=(ex.notas||{})[a.id];
      var n=nota!==undefined&&nota!==''?parseFloat(nota):null;
      var b=notaBadge(n);
      nr+='<div class="nota-row">'
        +'<div class="av av-sm">'+ini(a.nombre,a.apellido)+'</div>'
        +'<div style="flex:1;font-size:14px">'+a.apellido+', '+a.nombre+'</div>'
        +'<input class="nota-inp" type="number" min="0" max="10" step="0.1" placeholder="--" value="'+(nota!==undefined&&nota!==''?nota:'')+'" data-ei="'+ei+'" data-aid="'+a.id+'">'
        +'<span class="nota-b '+b.cls+'" id="nb-'+ei+'-'+a.id+'">'+b.txt+'</span>'
        +'</div>';
    });
    html+='<div class="exam-card">'
      +'<div class="exam-hdr" data-ei="'+ei+'">'
      +'<div><div style="font-weight:600;font-size:15px">'+ex.nombre+'</div>'
      +'<div style="font-size:12px;color:var(--txt2);margin-top:2px">'+(ex.fecha||'')+(ex.hora?' &middot; '+ex.hora:'')+'</div>'
      +(ex.contenidos?'<div style="font-size:12px;color:var(--txt2);margin-top:1px">'+ex.contenidos+'</div>':'')
      +'</div><span style="color:var(--txt2);font-size:18px" id="arr-'+ei+'">+</span></div>'
      +'<div class="exam-body" id="exbody-'+ei+'">'
      +(c.alumnos.length?nr:'<div style="font-size:13px;color:var(--txt2)">Agrega alumnos primero.</div>')
      +'<div style="margin-top:10px;display:flex;align-items:center;gap:10px">'
      +'<button class="btn btn-sm btn-danger" data-delex="'+ei+'">Eliminar examen</button>'
      +'<span style="font-size:11px;color:var(--txt2)">Verde = 7 o mas</span>'
      +'</div></div></div>';
  });
  el.innerHTML=html;
  document.querySelectorAll('.exam-hdr').forEach(function(h){
    h.addEventListener('click',function(){
      var ei=parseInt(this.getAttribute('data-ei'));
      var body=document.getElementById('exbody-'+ei),arr=document.getElementById('arr-'+ei);
      var open=body.style.display==='block';
      body.style.display=open?'none':'block';
      arr.textContent=open?'+':'-';
    });
  });
  document.querySelectorAll('.nota-inp').forEach(function(inp){
    inp.addEventListener('change',function(){
      var v=parseFloat(this.value);
      if(isNaN(v)){this.value='';v=NaN;}else{v=Math.min(10,Math.max(0,v));this.value=v;}
      var ei=parseInt(this.getAttribute('data-ei')),aid=this.getAttribute('data-aid');
      if(!DB[ci].examenes[ei].notas)DB[ci].examenes[ei].notas={};
      DB[ci].examenes[ei].notas[aid]=isNaN(v)?'':v;save();
      var b=document.getElementById('nb-'+ei+'-'+aid);
      if(b){var nb=notaBadge(isNaN(v)?null:v);b.textContent=nb.txt;b.className='nota-b '+nb.cls;}
    });
  });
  document.querySelectorAll('[data-delex]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var ei=parseInt(this.getAttribute('data-delex'));
      confirmar('Eliminar '+DB[ci].examenes[ei].nombre+'?',function(){
        DB[ci].examenes.splice(ei,1);save();renderExamenes();toast('Examen eliminado');
      });
    });
  });
}

renderCursos();
</script>
